name: cin_cin_app
description: Virtual toast app - Cin Cin!
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_blue_plus: ^1.31.15
  audioplayers: ^6.0.0
  vibration: ^2.0.0
  shared_preferences: ^2.2.2
  permission_handler: ^11.3.0
  flutter_foreground_task: ^8.0.1
  provider: ^6.1.2
  lottie: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/animations/
